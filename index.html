<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Fight 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon_io/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon_io/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon_io/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon_io/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Space Fight 2" />
    <link rel="manifest" href="img/favicon_io/site.webmanifest" />
</head>

<body onload="startGame(); showMainMenu(); updateVolume();">
    <div id="GameScreen">
        <div class="MainMenu hidden" id="MainMenu">
            <div class="menu" id="startMenu">
                <button id="startBtn"></button>
                <button id="settingsBtn"></button>
            </div>
            <div id="settingsMenu" class="settings-menu hidden">
                <div class="header-row">
                    <button id="backBtn"></button>
                    <h2>Settings</h2>
                </div>
                <div class="settingsMenuContent">
                    <div class="volume-setting">
                        <p>Music</p>
                        <input id="MainMusicSlider" type="range" min="0" max="0.2" step="0.001" value="0.00">
                        <div id="MusicSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Shot Sound</p>
                        <input id="ShotSoundSlider" type="range" min="0" max="0.2" step="0.001" value="0.02">
                        <div id="ShotSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Hit Sound</p>
                        <input id="HitSoundSlider" type="range" min="0" max="1" step="0.001" value="0.1">
                        <div id="HitSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Menu</p>
                        <input id="MenuSoundSlider" type="range" min="0" max="1" step="0.001" value="0.1">
                        <div id="MenuSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Typing</p>
                        <input id="TypeSoundSlider" type="range" min="0" max="1" step="0.001" value="0.1">
                        <div id="TypeSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <div class="MobileLayout">
                            <p>Mobile Layout</p>
                            <label class="checkBox">
                                <input id="MobileLayoutcheck" type="checkbox">
                                <div class="transition"></div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="gameOverScreen" class="game-over-screen">
            <div class="game-over-content">
                <h1 id="goTitle">GAME OVER</h1>
                <div class="go-stats">
                    <p id="goScore">Score: 0</p>
                    <p id="goBestScore">Best: 0</p>
                    <p id="goKills">Kills: 0</p>
                    <p id="goWave">Wave 1 of 10</p>
                </div>
                <button id="restartBtn">Play Again</button>
            </div>
        </div>

        <h3 class="Event-Log hidden" id="eventLog"></h3>
        <h2 class="Landscape-advise">For the Best Experience please Rotate your Phone</h2>
        <div id="canvasWrapper">
            <canvas id="canvas" width="1200" height="800"></canvas>
            <div class="button-Layout">
                <div class="top-right-btns">
                    <button id="SoundMuteButton">
                        <svg id="svgSound" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" stroke="none" />
                            <path d="M16.5 7.5a5 5 0 0 1 0 9" />
                            <path d="M19.07 4.93a9 9 0 0 1 0 14.14" />
                        </svg>
                        <svg id="svgMute" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round" style="display:none">
                            <path d="M3 9v6h4l5 5V4L7 9H3z" fill="currentColor" stroke="none" />
                            <line x1="23" y1="9" x2="17" y2="15" />
                            <line x1="17" y1="9" x2="23" y2="15" />
                        </svg>
                    </button>
                    <button id="SettingsButton">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" />
                        </svg>
                    </button>
                    <button id="FullscreenButton">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3" />
                        </svg>
                    </button>
                </div>
                <button id="nextWaveBtn" class="hidden">Next Wave ›</button>
                <button id="Handy_Oben" class="mobile--layout blink--effect"></button>
                <button id="Handy_Unten" class="mobile--layout blink--effect"></button>
                <button id="Handy_shot" class="mobile--layout"></button>
            </div>
        </div>
    </div>


    <script src="bosses.js"></script>
    <script src="script.js"></script>
    <script src="EventLog.js"></script>
</body>

</html>

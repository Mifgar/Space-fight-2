<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Fight 2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body onload="startGame(); showMainMenu();">
    <div class="MainMenu hidden" id="MainMenu">
        <div class="menu">
            <button id="startBtn"></button>
            <button id="settingsBtn"></button>
        </div>
        <div id="volumeMenu" class="volume-menu hidden">
            <button id="backBtn"></button>
            <div class="VolumeMenuContent">
                <p>Music</p>
                <input id="MainMusicSlider" type="range" min="0" max="0.1" step="0.001" value="0.001">
                <p>Shot Sound</p>
                <input id="ShotSoundSlider" type="range" min="0" max="0.1" step="0.001" value="0.001">
                <p>Menu</p>
                <input id="MenuSoundSlider" type="range" min="0" max="1" step="0.001" value="0.001">
            </div>
        </div>
    </div>
    <h2 class="Landscape-advise">For the Best Experience please Rotate your Phone</h2>
    <canvas id="canvas" width="1200px" height="800px" z-index="0"></canvas>
    <p id="score" class="hidden"></p>


    <script src="script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Fight 2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/favicon_io/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="img/favicon_io/favicon.svg" />
    <link rel="shortcut icon" href="img/favicon_io/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicon_io/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Space Fight 2" />
    <link rel="manifest" href="img/favicon_io/site.webmanifest" />
</head>

<body onload="startGame(); showMainMenu(); updateVolume();">
    <div id="GameScreen">
        <div class="MainMenu hidden" id="MainMenu">
            <div class="menu">
                <button id="startBtn"></button>
                <button id="settingsBtn"></button>
            </div>
            <div id="volumeMenu" class="volume-menu hidden">
                <div class="header-row">
                    <button id="backBtn"></button>
                    <h2>Settings</h2>
                </div>
                <div class="VolumeMenuContent">
                    <div class="volume-setting">
                        <p>Music</p>
                        <input id="MainMusicSlider" type="range" min="0" max="0.2" step="0.001" value="0.00">
                        <div id="MusicSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Shot Sound</p>
                        <input id="ShotSoundSlider" type="range" min="0" max="0.2" step="0.001" value="0.02">
                        <div id="ShotSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <p>Menu</p>
                        <input id="MenuSoundSlider" type="range" min="0" max="1" step="0.001" value="0.1">
                        <div id="MenuSlider-value">0%</div>
                    </div>
                    <div class="volume-setting">
                        <div class="MobileLayout">
                            <p>Mobile Layout</p>
                            <label class="checkBox">
                                <input id="MobileLayoutcheck" type="checkbox">
                                <div class="transition"></div>
                            </label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Handy buttons ↓ -->
        <div class="button-Layout">
            <button id="SoundMuteButton"></button>
            <button id="SettingsButton"></button>
            <button id="FullscreenButton"></button>
            <button id="Handy_Oben" class="mobile--layout blink--effect"></button>
            <button id="Handy_Unten" class="mobile--layout blink--effect"></button>
            <button id="Handy_shot" class="mobile--layout"></button>
        </div>
        <!-- Handy Buttons ↑ -->

        <h2 class="Landscape-advise">For the Best Experience please Rotate your Phone</h2>
        <canvas id="canvas" width="1200px" height="800px" z-index="0"></canvas>
        <p id="score" class="hidden"></p>
    </div>
    <script src="bosses.js"></script>
    <script src="script.js"></script>
</body>

</html>
